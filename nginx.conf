user www-data;
worker_processes auto;
pid /run/nginx.pid;
error_log /var/log/nginx/error.log;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types; # Required for SVG mime type
  default_type application/octet-stream; # Required for SVG mime type
  client_max_body_size 100M;

  # Preserve Caddy's X-Forwarded-Proto when it's present. Caddy terminates
  # TLS and proxies to nginx over plain HTTP on localhost, so $scheme
  # alone would report "http" and cause uvicorn/Starlette to emit
  # http:// in absolute redirect URLs (breaks Claude Desktop's MCP
  # connection on the /mcp/ → /mcp trailing-slash redirect).
  map $http_x_forwarded_proto $forwarded_proto {
    default $scheme;
    ~.      $http_x_forwarded_proto;
  }

  server {
    listen 80;
    server_name localhost;

    location / {
      proxy_pass http://localhost:3000;
      proxy_http_version 1.1; # Required for WebSocket
      proxy_set_header Upgrade $http_upgrade; # WebSocket header
      proxy_set_header Connection "upgrade"; # WebSocket header
      proxy_set_header Host $host;
      proxy_read_timeout 30m;
      proxy_connect_timeout 30m;
    }

    location /api/v1/ {
      proxy_pass http://localhost:8000;
      proxy_read_timeout 30m;
      proxy_connect_timeout 30m;
      # Forward client identity so FastAPI can distinguish same-origin
      # browser calls (used by the tokens endpoint's CSRF check) and
      # see the real client IP / scheme behind nginx.
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $forwarded_proto;
    }

    # OAuth 2.1 authorization server endpoints (same FastAPI upstream).
    # Browser-facing redirects need NextAuth session cookies, so we keep
    # Host forwarding and forward X-Forwarded-* for correct scheme on
    # issued redirect URLs.
    location /oauth/ {
      proxy_pass http://localhost:8000;
      proxy_read_timeout 30m;
      proxy_connect_timeout 30m;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $forwarded_proto;
    }

    # RFC 8414 / 7517 / 9728 discovery endpoints at the origin root.
    # These are unauthenticated and cache-friendly.
    location /.well-known/ {
      proxy_pass http://localhost:8000;
      proxy_read_timeout 30s;
      proxy_connect_timeout 5s;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-Proto $forwarded_proto;
    }

    # MCP
    location /mcp/ {
      proxy_pass http://localhost:8001/mcp/;
      proxy_read_timeout 30m;
      proxy_connect_timeout 30m;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $forwarded_proto;
    }

    location /mcp {
      proxy_pass http://localhost:8001/mcp;
      proxy_read_timeout 30m;
      proxy_connect_timeout 30m;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $forwarded_proto;
    }


    location /docs {
      proxy_pass http://localhost:8000/docs;
      proxy_read_timeout 30m;
      proxy_connect_timeout 30m;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-Proto $forwarded_proto;
    }

    location /openapi.json {
      proxy_pass http://localhost:8000/openapi.json;
      proxy_read_timeout 30m;
      proxy_connect_timeout 30m;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-Proto $forwarded_proto;
    }

    # Static
    location /static {
      alias /app/servers/fastapi/static/;
      expires 1y;
      add_header Cache-Control "public, immutable";
    }

    location /app_data/images/ {
      alias /app_data/images/;
      expires 1y;
      add_header Cache-Control "public, immutable";
    }

    location /app_data/exports/ {
      alias /app_data/exports/;
      expires 1y;
      add_header Cache-Control "public, immutable";
    }

    location /app_data/uploads/ {
      alias /app_data/uploads/;
      expires 1y;
      add_header Cache-Control "public, immutable";
    }

    location /app_data/fonts/ {
      alias /app_data/fonts/;
      expires 1y;
      add_header Cache-Control "public, immutable";
    }
  }
}