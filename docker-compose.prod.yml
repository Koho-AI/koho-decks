# Production overrides for the koho-dev VPS deployment.
#
# Applied on top of docker-compose.yml:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# - Binds the app to loopback only; Caddy fronts TLS at decks.koban.dev.
# - Drops the 1455 Codex OAuth port (irrelevant on a shared server — the
#   browser can't redirect to the VPS's localhost).
# - Pins the built image to `koho-decks:latest` so deploy.sh can retag
#   the previous version as `koho-decks:previous` for rollback.
# - Pins postgres to 127.0.0.1 as well so psql from the host still works
#   but the DB never becomes reachable over the tailnet.
services:
  production:
    image: koho-decks:latest
    build:
      # Forward INCLUDE_OLLAMA from .env to the Dockerfile ARG so the
      # ~13 GB ollama + CUDA runtime can be skipped on koho-dev. See
      # Dockerfile — default is true to preserve upstream Presenton
      # parity; koho-dev's .env sets INCLUDE_OLLAMA=false.
      args:
        INCLUDE_OLLAMA: ${INCLUDE_OLLAMA:-true}
    ports: !override
      - "127.0.0.1:${HOST_PORT:-8094}:80"
    environment:
      # Not in base docker-compose.yml's env list; add here so .env reaches
      # the container. Without this, FastAPI's startup lifespan raises
      # "IMAGE_PROVIDER must be provided" even when the .env sets
      # DISABLE_IMAGE_GENERATION=true.
      - DISABLE_IMAGE_GENERATION=${DISABLE_IMAGE_GENERATION:-false}
      # Shared secret between Next.js export routes and FastAPI's
      # AuthMiddleware. Lets the in-container Puppeteer path fetch
      # presentation data without a user session. See
      # servers/fastapi/api/middlewares.py::_is_internal_render_request.
      - INTERNAL_RENDER_TOKEN=${INTERNAL_RENDER_TOKEN:-}
      # Runtime mirror of the build arg — start.js checks it to decide
      # whether to spawn `ollama serve`. Must match the build arg or the
      # container will try to exec a missing binary.
      - INCLUDE_OLLAMA=${INCLUDE_OLLAMA:-true}

  postgres:
    ports: !override
      - "127.0.0.1:5432:5432"
